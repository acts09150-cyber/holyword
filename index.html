<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolyWord Global - 원어 성경 연구</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_ID" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-ad-banner" style="text-align:center; padding:10px; background:#f4f7f6;">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_ID" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <header class="main-header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html"><h1>HolyWord <span>GLOBAL</span></h1></a>
            </div>
            <ul class="nav-menu">
                <li><a href="pages/daily.html">Daily</a></li>
                <li><a href="pages/topics.html">Topics</a></li>
                <li><a href="pages/prayer.html">Prayer</a></li>
                <li><a href="pages/search.html">Search</a></li>
            </ul>
        </nav>
    </header>

    <section class="bible-controls">
        <div class="control-row">
            <select id="bookSelect" onchange="onBookChange()"></select>
            <select id="chapterSelect" onchange="onChapterChange()"></select>
            <select id="leftTrans" onchange="loadBoth()">
                <option value="KRV">Korean (KRV)</option>
                <option value="WLC">Hebrew (WLC)</option>
            </select>
            <select id="rightTrans" onchange="loadBoth()">
                <option value="KJV">English (KJV)</option>
                <option value="NIV">English (NIV)</option>
            </select>
        </div>
    </section>

    <main class="main-layout">
        <div class="bible-grid">
            <div id="leftVerses" class="verse-column"></div>
            <div id="rightVerses" class="verse-column"></div>
        </div>
        
        <aside class="side-analysis">
            <div id="original-analysis-container" class="analysis-card">
                <div class="card-header">
                    <i class="fas fa-book-open"></i> 원어 분석 & 복사
                </div>
                <div id="analysis-content" class="card-body">
                    <p class="placeholder-text">성경 구절을 클릭하시면<br>원어 데이터가 로드됩니다.</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="toast"></div>

    <script src="js/bible-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
