<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolyWord Global - 원어 성경 연구</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_ID" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bible-reader-page"> <header class="main-header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html"><h1>HolyWord <span>GLOBAL</span></h1></a>
            </div>
            <ul class="nav-menu">
                <li><a href="pages/daily.html">Daily</a></li>
                <li><a href="pages/topics.html">Topics</a></li>
                <li><a href="pages/prayer.html">Prayer</a></li>
                <li><a href="pages/search.html">Search</a></li>
            </ul>
        </nav>
    </header>

    <div class="container main-layout-container">
        <div class="ad-section top-ad" style="margin: 20px 0; text-align: center;">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_ID" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <section class="bible-controls card">
            <div class="control-row">
                <select id="bookSelect" onchange="onBookChange()"></select>
                <select id="chapterSelect" onchange="onChapterChange()"></select>
                <div class="trans-selectors">
                    <select id="leftTrans" onchange="loadBoth()">
                        <option value="KRV">Korean (KRV)</option>
                        <option value="WLC">Hebrew (WLC)</option>
                    </select>
                    <span class="swap-icon">↔</span>
                    <select id="rightTrans" onchange="loadBoth()">
                        <option value="KJV" selected>English (KJV)</option>
                        <option value="NIV">English (NIV)</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="content-wrapper" style="display: flex; gap: 20px; align-items: flex-start;">
            <div class="bible-display-area card" style="flex: 2;">
                <div id="bible-grid" class="bible-grid">
                    <div id="leftVerses" class="verse-column"></div>
                    <div id="rightVerses" class="verse-column"></div>
                </div>
            </div>

            <aside class="side-content" style="flex: 0.8; position: sticky; top: 20px;">
                <div id="original-analysis-container" class="card" style="background-color: transparent; border: 1px solid #d1d8d6;">
                    <div class="card-header" style="background: #2c3e50; color: white; padding: 12px; border-radius: 8px 8px 0 0;">
                        <i class="fas fa-microscope"></i> 원어 분석 & 복사
                    </div>
                    <div id="analysis-content" class="card-body" style="padding: 20px; min-height: 300px;">
                        <p style="color: #7f8c8d; text-align: center;">성경 구절을 클릭하시면<br>이곳에 원어 분석이 나타납니다.</p>
                    </div>
                </div>
                <div class="ad-section side-ad" style="margin-top: 20px;">
                    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_ID" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>
            </aside>
        </div>
    </div>

    <div id="toast"></div>

    <script src="js/bible-data.js"></script> <script src="js/app.js"></script>
</body>
</html>
