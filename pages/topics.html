let currentTopic='위로';

function switchTopic(btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTopic=btn.dataset.topic;
  renderTopic(currentTopic);
  window.scrollTo({top:200,behavior:'smooth'});
}

function renderTopic(topic){
  const data=TOPICS[topic];
  if(!data) return;
  const el=document.getElementById('topicContent');

  let html=`
    <div style="margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid rgba(201,168,76,0.2);">
      <div style="font-family:'Playfair Display',serif;font-size:24px;color:#2D1F08;font-weight:700;">${data.emoji} ${topic}에 관한 말씀</div>
      <div style="font-size:12px;color:#9E855A;margin-top:4px;">${data.verses.length}개 구절</div>
    </div>
    <div style="margin:20px 0;text-align:center;">
      <ins class="adsbygoogle" style="display:block"
           data-ad-client="ca-pub-8675368228460145"
           data-ad-slot="2240680444"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>
    <div class="verse-grid">`;

  data.verses.forEach(item=>{
    const sv=item.v.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const sr=item.r.replace(/'/g,'&#39;');
    html+=`<div class="v-card">
      <div class="v-card-actions">
        <button class="v-action-btn" onclick="copyCard(event,'${sv}','${sr}')">📋 복사</button>
        <button class="v-action-btn" onclick="goRead(event,'${sr}')">📖 읽기</button>
      </div>
      <div class="v-card-text">"${item.v}"</div>
      <div class="v-card-ref">${item.r}</div>
    </div>`;
  });

  html+='</div>';
  el.innerHTML=html;

  try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}

function copyCard(e,verse,ref){
  e.stopPropagation();
  const v=verse.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  navigator.clipboard.writeText('"'+v+'" — '+ref+'\n\nhttps://bible2.kingdom2025.com');
  showToast('구절이 복사되었습니다 ✓');
}

function goRead(e,ref){
  e.stopPropagation();
  const m=ref.match(/^(.+?)\s+(\d+)/);
  if(m) window.location.href='../index.html?book='+encodeURIComponent(m[1])+'&ch='+m[2]+'&lang=ko';
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// URL 파라미터
const params=new URLSearchParams(window.location.search);
const tp=params.get('topic');
if(tp&&TOPICS[tp]){
  currentTopic=tp;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    if(b.dataset.topic===tp)b.classList.add('active');
    else b.classList.remove('active');
  });
}
renderTopic(currentTopic);
</script>
