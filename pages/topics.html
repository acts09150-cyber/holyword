<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8675368228460145" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.topics-hero {
  background: var(--dark);
  border-bottom: 1px solid var(--border-strong);
  padding: 48px 32px;
  text-align: center;
}
.topics-hero h1 {
  font-family: var(--font-serif);
  color: var(--gold);
  font-size: 36px;
  margin-bottom: 12px;
}
.topics-hero p { color: rgba(255,255,255,0.55); font-size: 15px; }

.topics-page {
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 24px;
}

.topic-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
  justify-content: center;
}
.topic-tab {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 9px 18px;
  border-radius: 24px;
  font-size: 14px;
  transition: all 0.2s;
  cursor: pointer;
  font-family: var(--font-sans);
}
.topic-tab:hover, .topic-tab.active {
  background: var(--gold);
  color: var(--dark);
  border-color: var(--gold);
  font-weight: 600;
}

.topic-section { margin-bottom: 48px; }
.topic-section-title {
  font-family: var(--font-serif);
  font-size: 24px;
  color: var(--dark);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}

.verse-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.verse-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.verse-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform 0.2s;
}
.verse-card:hover::before { transform: scaleY(1); }
.verse-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }

.vc-text {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--text-primary);
  line-height: 1.75;
  margin-bottom: 14px;
  font-style: italic;
}
.vc-ref {
  font-size: 12px;
  color: var(--gold);
  font-weight: 600;
}
.vc-copy {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}
.verse-card:hover .vc-copy { opacity: 1; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="logo">
      <span class="logo-cross">✦</span>
      <span class="logo-text">HolyWord</span>
    </a>
    <nav class="header-nav">
      <a href="../index.html" class="nav-link">성경 읽기</a>
      <a href="topics.html" class="nav-link active">주제별 구절</a>
      <a href="daily.html" class="nav-link">오늘의 말씀</a>
      <a href="search.html" class="nav-link">구절 검색</a>
    </nav>
  </div>
</header>

<!-- 상단 광고 -->
<div class="ad-zone ad-leaderboard">
  <div class="ad-label">광고</div>
  <div class="ad-placeholder" style="width:100%;max-width:728px;height:90px;">
    <div class="ad-demo-text"><strong>728×90</strong> 주제별 구절 페이지 광고</div>
  </div>
</div>

<div class="topics-hero">
  <h1>주제별 말씀 모음</h1>
  <p>삶의 모든 순간에 필요한 성경 구절을 주제별로 찾아보세요</p>
</div>

<div class="topics-page">

  <!-- 주제 탭 -->
  <div class="topic-tabs">
    <button class="topic-tab active" onclick="showTopic('all', this)">전체</button>
    <button class="topic-tab" onclick="showTopic('위로', this)">🤍 위로</button>
    <button class="topic-tab" onclick="showTopic('믿음', this)">⭐ 믿음</button>
    <button class="topic-tab" onclick="showTopic('사랑', this)">❤️ 사랑</button>
    <button class="topic-tab" onclick="showTopic('감사', this)">🙏 감사</button>
    <button class="topic-tab" onclick="showTopic('소망', this)">🌅 소망</button>
    <button class="topic-tab" onclick="showTopic('결혼', this)">💍 결혼</button>
    <button class="topic-tab" onclick="showTopic('치유', this)">💊 치유</button>
  </div>

  <!-- 광고 (주제 탭 아래) -->
  <div class="ad-zone ad-in-article" style="margin-bottom:40px;">
    <div class="ad-label">광고</div>
    <div class="ad-placeholder" style="width:100%;height:100px;">
      <div class="ad-demo-text"><strong>In-Article 광고</strong> · 주제 선택 후 노출</div>
    </div>
  </div>

  <!-- 구절 목록 -->
  <div id="topicContent"></div>

</div>

<!-- 하단 광고 -->
<div class="ad-zone ad-leaderboard">
  <div class="ad-label">광고</div>
  <div class="ad-placeholder" style="width:100%;max-width:728px;height:90px;">
    <div class="ad-demo-text"><strong>728×90</strong> 하단 배너</div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo">✦ HolyWord</div>
      <p class="footer-desc">전 세계 10개 언어로 성경을 무료로 읽을 수 있는 서비스입니다.</p>
    </div>
    <div class="footer-links-group">
      <div class="footer-col">
        <div class="footer-col-title">성경 읽기</div>
        <a href="../index.html">메인으로</a>
        <a href="topics.html">주제별 구절</a>
        <a href="daily.html">오늘의 말씀</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <span>© 2025 HolyWord</span>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="../js/bible-data.js"></script>
<script>
function showTopic(topic, btn) {
  document.querySelectorAll('.topic-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const content = document.getElementById('topicContent');
  content.innerHTML = '';

  const topics = topic === 'all' ? Object.keys(TOPIC_VERSES) : [topic];

  topics.forEach(t => {
    const verses = TOPIC_VERSES[t];
    if (!verses) return;

    const section = document.createElement('div');
    section.className = 'topic-section';
    section.innerHTML = `<h2 class="topic-section-title">${t}에 관한 말씀</h2>`;

    const grid = document.createElement('div');
    grid.className = 'verse-cards';

    verses.forEach(v => {
      const card = document.createElement('div');
      card.className = 'verse-card';
      card.innerHTML = `
        <button class="vc-copy" onclick="copyCard(event, this)">📋</button>
        <div class="vc-text">"${v.verse}"</div>
        <div class="vc-ref">${v.ref}</div>`;
      card.dataset.verse = v.verse;
      card.dataset.ref = v.ref;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    content.appendChild(section);
  });
}

function copyCard(e, btn) {
  e.stopPropagation();
  const card = btn.closest('.verse-card');
  const text = `"${card.dataset.verse}" — ${card.dataset.ref}\n\nhttps://holyword.kr`;
  navigator.clipboard.writeText(text).then(() => showToast('구절이 복사되었습니다 ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 초기 로드
document.querySelector('.topic-tab').click();

// URL 파라미터 처리
const params = new URLSearchParams(window.location.search);
if (params.get('topic')) {
  const topicBtn = [...document.querySelectorAll('.topic-tab')]
    .find(b => b.textContent.includes(params.get('topic')));
  if (topicBtn) topicBtn.click();
}
</script>
</body>
