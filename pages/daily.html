<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 성경 말씀 - 매일 새로운 성경 구절로 하루를 시작하세요.">
<meta name="keywords" content="오늘의말씀, 성경구절, 매일말씀, 하루한말씀">
<title>오늘의 말씀 | HolyWord</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8675368228460145" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.daily-hero {
  background: var(--dark);
  min-height: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
  position: relative;
  overflow: hidden;
}
.daily-hero::before {
  content: '✦';
  position: absolute;
  font-size: 300px;
  color: rgba(201,168,76,0.04);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.daily-date {
  font-size: 13px;
  color: rgba(201,168,76,0.6);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 32px;
}
.daily-main-verse {
  font-family: var(--font-serif);
  font-size: clamp(22px, 4vw, 34px);
  color: #F0E6D0;
  line-height: 1.65;
  max-width: 720px;
  font-style: italic;
  margin-bottom: 28px;
}
.daily-main-ref {
  font-size: 16px;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 36px;
  letter-spacing: 0.5px;
}
.daily-share-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.daily-share-btn {
  background: rgba(201,168,76,0.15);
  border: 1px solid var(--border-strong);
  color: var(--gold);
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-sans);
}
.daily-share-btn:hover { background: var(--gold); color: var(--dark); }

.daily-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 24px;
}

.week-verses {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-top: 24px;
}
.week-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: all 0.2s;
}
.week-card:hover { border-color: var(--gold); }
.week-card.today {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.wc-day {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
.wc-day.today-label { color: var(--gold); font-weight: 700; }
.wc-verse {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.7;
  font-style: italic;
  margin-bottom: 10px;
}
.wc-ref { font-size: 11px; color: var(--gold); }

.section-title {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--dark);
  margin-bottom: 16px;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="logo">
      <span class="logo-cross">✦</span>
      <span class="logo-text">HolyWord</span>
    </a>
    <nav class="header-nav">
      <a href="../index.html" class="nav-link">성경 읽기</a>
      <a href="topics.html" class="nav-link">주제별 구절</a>
      <a href="daily.html" class="nav-link active">오늘의 말씀</a>
      <a href="search.html" class="nav-link">구절 검색</a>
    </nav>
  </div>
</header>

<!-- 상단 광고 -->
<div class="ad-zone ad-leaderboard">
  <div class="ad-label">광고</div>
</div>
</div>

<!-- 오늘의 말씀 히어로 -->
<div class="daily-hero">
  <div class="daily-date" id="todayDate"></div>
  <div class="daily-main-verse" id="todayVerse"></div>
  <div class="daily-main-ref" id="todayRef"></div>
  <div class="daily-share-row">
    <button class="daily-share-btn" onclick="copyToday()">📋 복사하기</button>
    <button class="daily-share-btn" onclick="shareToday()">📤 공유하기</button>
    <button class="daily-share-btn" onclick="shareToTwitter()">🐦 트위터</button>
    <button class="daily-share-btn" onclick="shareToKakao()">💬 카카오톡</button>
  </div>
</div>

<div class="daily-content">

  <!-- 인아티클 광고 -->
  <div class="ad-zone ad-in-article">
    <div class="ad-label">광고</div>
</div>
  </div>

  <!-- 이번 주 말씀 -->
  <div style="margin-bottom:48px;">
    <div class="section-title">📅 이번 주 말씀</div>
    <div class="week-verses" id="weekVerses"></div>
  </div>

  <!-- 하단 광고 -->
  <div class="ad-zone ad-in-article">
    <div class="ad-label">광고</div>
</div>
  </div>

  <!-- 뉴스레터 CTA -->
  <div style="background:var(--dark);border-radius:var(--radius-lg);padding:40px;text-align:center;margin-top:48px;border:1px solid var(--border-strong);">
    <div style="font-family:var(--font-serif);font-size:26px;color:var(--gold);margin-bottom:12px;">매일 아침 말씀 구독</div>
    <p style="color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:24px;">매일 오전 7시, 말씀 한 구절을 이메일로 받아보세요</p>
    <div style="display:flex;gap:10px;max-width:400px;margin:0 auto;">
      <input type="email" class="email-input" placeholder="이메일 주소" style="flex:1;">
      <button onclick="subscribe()" style="background:var(--gold);color:var(--dark);border:none;padding:10px 20px;border-radius:6px;font-weight:700;cursor:pointer;white-space:nowrap;">구독하기</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo">✦ HolyWord</div>
      <p class="footer-desc">전 세계 10개 언어로 성경을 무료로 읽을 수 있는 서비스입니다.</p>
    </div>
    <div class="footer-links-group">
      <div class="footer-col">
        <div class="footer-col-title">링크</div>
        <a href="../index.html">성경 읽기</a>
        <a href="topics.html">주제별 구절</a>
        <a href="search.html">구절 검색</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom"><span>© 2025 HolyWord</span></div>
</footer>

<div class="toast" id="toast"></div>

<script src="../js/bible-data.js"></script>
<script>
const DAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function init() {
  const now = new Date();
  const dateStr = `${now.getFullYear()}년 ${MONTHS_KO[now.getMonth()]} ${now.getDate()}일 (${DAYS_KO[now.getDay()]}요일)`;
  document.getElementById('todayDate').textContent = dateStr;

  const todayIdx = now.getDate() % DAILY_VERSES.length;
  const today = DAILY_VERSES[todayIdx];
  document.getElementById('todayVerse').textContent = `"${today.text}"`;
  document.getElementById('todayRef').textContent = today.ref;
  window._today = today;

  // 이번 주 말씀
  const container = document.getElementById('weekVerses');
  for (let i = 0; i < 7; i++) {
    const idx = (todayIdx - 3 + i + DAILY_VERSES.length) % DAILY_VERSES.length;
    const v = DAILY_VERSES[idx];
    const isToday = i === 3;
    const d = new Date(); d.setDate(d.getDate() - 3 + i);
    const card = document.createElement('div');
    card.className = 'week-card' + (isToday ? ' today' : '');
    card.innerHTML = `
      <div class="wc-day ${isToday ? 'today-label' : ''}">${MONTHS_KO[d.getMonth()]} ${d.getDate()}일 ${DAYS_KO[d.getDay()]}요일${isToday ? ' (오늘)' : ''}</div>
      <div class="wc-verse">"${v.text}"</div>
      <div class="wc-ref">${v.ref}</div>`;
    container.appendChild(card);
  }
}

function copyToday() {
  const t = window._today;
  navigator.clipboard.writeText(`"${t.text}" — ${t.ref}\n\n출처: HolyWord (${window.location.origin})`);
  showToast('복사되었습니다 ✓');
}

function shareToday() {
  if (navigator.share) {
    navigator.share({ title: '오늘의 말씀', text: `"${window._today.text}" — ${window._today.ref}`, url: window.location.href });
  } else copyToday();
}

function shareToTwitter() {
  const t = window._today;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('"' + t.text + '" — ' + t.ref + '\n\n#오늘의말씀 #성경 #HolyWord')}&url=${encodeURIComponent(window.location.href)}`, '_blank');
}

function shareToKakao() { showToast('카카오 SDK 연동 후 사용 가능합니다'); }

function subscribe() {
  const input = document.querySelector('.email-input');
  if (!input?.value.includes('@')) { showToast('올바른 이메일을 입력해주세요'); return; }
  showToast('구독 완료! 내일 아침부터 말씀을 보내드립니다 ✓');
  input.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
