let currentQuery = '';

function doSearch() {
  const q = document.getElementById('mainSearchInput').value.trim();
  if (!q) { showToast('검색어를 입력해주세요'); return; }
  currentQuery = q;
  // 칩 활성화 해제
  document.querySelectorAll('.quick-chip').forEach(c => c.classList.remove('active'));
  renderResults(q);
}

function quickSearch(keyword, btn) {
  document.querySelectorAll('.quick-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mainSearchInput').value = keyword;
  currentQuery = keyword;
  renderResults(keyword);
}

function renderResults(query) {
  const area = document.getElementById('resultsArea');
  const q = query.toLowerCase().trim();

  // 검색
  const results = ALL_VERSES.filter(item => {
    const inVerse = item.v.toLowerCase().includes(q);
    const inRef = item.r.toLowerCase().includes(q);
    const inKeys = item.k.some(k => k.toLowerCase().includes(q) || q.includes(k.toLowerCase()));
    return inVerse || inRef || inKeys;
  });

  if (results.length === 0) {
    area.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <div class="no-results-text">"${query}"에 대한 검색 결과가 없습니다</div>
        <div class="no-results-sub">다른 키워드로 검색해보세요</div>
      </div>`;
    return;
  }

  // 하이라이트 함수
  function highlight(text, q) {
    if (!q) return text;
    const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  area.innerHTML = `<div class="results-header">
    "<strong>${query}</strong>" 검색 결과 ${results.length}개
  </div>`;

  results.forEach(item => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-actions">
        <button class="result-action-btn" onclick="copyResult(event,'${item.v.replace(/'/g,"\\'")}','${item.r}')">📋 복사</button>
        <button class="result-action-btn" onclick="goToVerse(event,'${item.r}')">📖 읽기</button>
      </div>
      <div class="result-verse">"${highlight(item.v, q)}"</div>
      <div class="result-ref">${item.r}</div>`;
    area.appendChild(card);
  });
}

function copyResult(e, verse, ref) {
  e.stopPropagation();
  navigator.clipboard.writeText(`"${verse}" — ${ref}\n\nhttps://bible2.kingdom2025.com`);
  showToast('구절이 복사되었습니다 ✓');
}

function goToVerse(e, ref) {
  e.stopPropagation();
  // 책 이름 파싱해서 메인 페이지로 이동
  const match = ref.match(/^(.+?)\s+(\d+)/);
  if (match) {
    const book = match[1];
    const ch = match[2];
    window.location.href = `../index.html?book=${encodeURIComponent(book)}&ch=${ch}&lang=ko`;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// URL 파라미터로 검색어 전달
const params = new URLSearchParams(window.location.search);
if (params.get('q')) {
  document.getElementById('mainSearchInput').value = params.get('q');
  renderResults(params.get('q'));
}
</script>
